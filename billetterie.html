<!-- Billetterie  -->
<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bizingue - Billetterie</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />

    <!-- Pretix Widget code -->
    <!-- DOCU : https://docs.pretix.eu/guides/widget/ -->

    <link rel="stylesheet" type="text/css"
        href="https://tickets.bouvier.family/TLDR/billets26/widget/v2.css" crossorigin>
    <script type="text/javascript" src="https://tickets.bouvier.family/widget/v2.fr.js" crossorigin></script>

    <style>
        /* Optional container styling for Pretix widget */
        #pretix-widget-container {
            width: 100%;
            max-width: 800px;
            margin: 2rem auto;
            min-height: 600px; /* Ensures the widget is visible */
        }
    </style>
</head>

<body>
    <canvas id="particles"></canvas>
    <div class="radial-glow"></div>

    <main>
        <h1 class="tagline">Billetterie</h1>
        <div class="divider divider-cyan"></div>

        <!-- Pretix Widget -->
        <!--It only allows the widget to fully initialize if the domain in the browser matches the Pretix domain (or is explicitly allowed in Pretix settings).
        Doesn't work on local host or github.io-->

        <div id="pretix-widget-container">
            <pretix-widget event="https://tickets.bouvier.family/TLDR/billets26/"></pretix-widget>
            <noscript>
                <div class="pretix-widget">
                    <div class="pretix-widget-info-message">
                        JavaScript is disabled in your browser. To access our ticket shop without JavaScript, please <a
                            target="_blank" rel="noopener" href="https://tickets.bouvier.family/TLDR/billets26/">click
                            here</a>.
                    </div>
                </div>
            </noscript>
        </div>

        <div class="divider divider-amber"></div>

        <div class="buttons">
            <a href="index.html" class="billetterie pill">
                <span class="dot"></span>
                <span>Retour à l'accueil</span>
            </a>
        </div>
    </main>

    <footer>© Bizingue 2026 - <a href="mailto:info@bizingue.ch" class="footer-email">info@bizingue.ch</a></footer>

    <script src="script.js"></script>
</body>

</html>
